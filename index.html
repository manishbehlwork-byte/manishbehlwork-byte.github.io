<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NEWAGE PV – Coming Soon</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-family: 'Segoe UI', sans-serif;
      color: white;
      overflow: hidden;
    }

    .glow-bg {
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, #f5a623 0%, transparent 70%);
      opacity: 0.08;
      top: -100px; left: -100px;
      border-radius: 50%;
      animation: pulse 6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.08; }
      50% { transform: scale(1.2); opacity: 0.13; }
    }

    .container {
      text-align: center;
      z-index: 1;
      padding: 2rem;
    }

    .logo {
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: 4px;
      background: linear-gradient(135deg, #f5a623, #f7c948);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.3rem;
    }

    .tagline {
      font-size: 0.9rem;
      letter-spacing: 3px;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 3rem;
    }

    .badge {
      display: inline-block;
      background: rgba(245,166,35,0.15);
      border: 1px solid rgba(245,166,35,0.4);
      color: #f5a623;
      padding: 0.5rem 1.5rem;
      border-radius: 50px;
      font-size: 0.85rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
      line-height: 1.2;
    }

    p {
      color: #aaa;
      font-size: 1.05rem;
      max-width: 420px;
      margin: 0 auto 3rem;
      line-height: 1.7;
    }

    .dots {
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .dot {
      width: 10px; height: 10px;
      background: #f5a623;
      border-radius: 50%;
      animation: bounce 1.4s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; background: #f7c948; }
    .dot:nth-child(3) { animation-delay: 0.4s; background: #fff; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="glow-bg"></div>
  <div class="container">
    <div class="logo">NEWAGE PV</div>
    <div class="tagline">Powering the Future</div>
    <div class="badge">🚧 Under Maintenance</div>
    <h1>Something great<br/>is coming soon</h1>
    <p>We're working hard to bring you an amazing experience. Our site will be live shortly — stay tuned!</p>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</body>
</html>
