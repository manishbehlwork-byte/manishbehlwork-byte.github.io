<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewAge PV - Coming Soon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #0A2540;
            color: #FFFFFF;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
        }
        
        .logo {
            margin-bottom: 60px;
        }
        
        .logo-text {
            font-size: 56px;
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 10px;
        }
        
        .logo-new {
            color: #FFFFFF;
        }
        
        .logo-pv {
            color: #00A3E0;
        }
        
        .logo-line {
            width: 200px;
            height: 3px;
            background: #00A3E0;
            margin: 15px auto;
        }
        
        .tagline {
            font-size: 14px;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.7);
            text-transform: uppercase;
        }
        
        h1 {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 20px;
            line-height: 1.2;
        }
        
        .subtitle {
            font-size: 18px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 40px;
            line-height: 1.6;
        }
        
        .email-form {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 60px;
        }
        
        input[type="email"] {
            padding: 15px 20px;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: #FFFFFF;
            border-radius: 8px;
            font-size: 16px;
            width: 300px;
        }
        
        input[type="email"]::placeholder {
            color: rgba(255,255,255,0.5);
        }
        
        button {
            padding: 15px 35px;
            background: #00A3E0;
            color: #FFFFFF;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #0088cc;
            transform: translateY(-2px);
        }
        
        .contact {
            font-size: 16px;
            color: rgba(255,255,255,0.7);
            line-height: 1.8;
        }
        
        .contact a {
            color: #00A3E0;
            text-decoration: none;
        }
        
        @media (max-width: 768px) {
            .logo-text {
                font-size: 42px;
            }
            
            h1 {
                font-size: 32px;
            }
            
            .email-form {
                flex-direction: column;
            }
            
            input[type="email"] {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="logo-text">
                <span class="logo-new">NEWAGE</span> <span class="logo-pv">PV</span>
            </div>
            <div class="logo-line"></div>
            <div class="tagline">Powering Tomorrow</div>
        </div>
        
        <h1>Premium Solar Junction Boxes<br>Coming Soon</h1>
        
        <p class="subtitle">
            Manufacturing excellence in solar energy components.<br>
            Launching February 2026
        </p>
        
        <form class="email-form">
            <input type="email" placeholder="Your Email" required>
            <button type="submit">Notify Me</button>
        </form>
        
        <div class="contact">
            📧 <a href="mailto:info@newagepv.com">info@newagepv.com</a><br>
            📱 <a href="tel:+917041042909">+91 7041042909</a>
        </div>
    </div>
</body>
</html>
